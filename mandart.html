<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>이상향 — Mandal-Art</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080809;
    --surface: #0f0f10;
    --border: #1e1e20;
    --accent: #d4a853;
    --text: #e8e8e8;
    --text-dim: #505054;
    --center-bg: #100e06;

    --c1: #12101c; --h1: #9080bc; --h1b: #1a1628;
    --c2: #001a10; --h2: #00c870; --h2b: #002a18;
    --c3: #1a0e00; --h3: #e07830; --h3b: #281400;
    --c4: #001418; --h4: #00b4d0; --h4b: #001e26;
    --c5: #1a0010; --h5: #e0306a; --h5b: #280018;
    --c6: #141200; --h6: #c8b800; --h6b: #201e00;
    --c7: #001418; --h7: #3090e0; --h7b: #001a28;
    --c8: #0e1800; --h8: #70c020; --h8b: #142200;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 52px 0 88px;
  }

  .header { text-align: center; margin-bottom: 36px; padding: 0 24px; }
  .header-sub { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 16px; }
  .header h1 { font-family: 'IBM Plex Sans KR', sans-serif; font-size: clamp(22px, 3.5vw, 32px); font-weight: 300; color: #d0d0d0; letter-spacing: -2px; line-height: 1; }
  .header h1 span { color: #d0d0d0; font-weight: 500; }
  .header-line { width: 20px; height: 1px; background: var(--accent); margin: 18px auto 0; opacity: 0.5; }

  .mandart-wrapper { width: 100%; max-width: 900px; }

  .mandart-grid {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 1px;
    background: #000;
    width: 100%;
    aspect-ratio: 1 / 1;
  }

  .cell {
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 4px 3px;
    font-family: 'IBM Plex Sans KR', sans-serif;
    font-size: clamp(7px, 0.85vw, 10px);
    font-weight: 400; line-height: 1.35;
    color: var(--text-dim); background: var(--surface);
    transition: filter 0.1s; cursor: default;
    word-break: keep-all; overflow: hidden;
  }
  .cell:hover { filter: brightness(1.6); z-index: 2; position: relative; }
  .cell.area-header { font-weight: 600; font-size: clamp(8px, 0.95vw, 11px); color: #e0e0e0; letter-spacing: -0.3px; }
  .cell.center-goal { background: var(--center-bg) !important; outline: 1px solid #555; outline-offset: -1px; font-weight: 500; font-size: clamp(9px, 1.1vw, 13px); color: #d0d0d0 !important; letter-spacing: -0.5px; z-index: 3; }

  .a1 { background: var(--c1); color: #7060a0; } .a1.area-header { background: var(--h1b); color: var(--h1); }
  .a2 { background: var(--c2); color: #00905a; } .a2.area-header { background: var(--h2b); color: var(--h2); }
  .a3 { background: var(--c3); color: #a05820; } .a3.area-header { background: var(--h3b); color: var(--h3); }
  .a4 { background: var(--c4); color: #008498; } .a4.area-header { background: var(--h4b); color: var(--h4); }
  .center-block { background: #0c0b04; color: #888; } .center-block.area-header { background: #100e06; color: #c0c0c0; font-weight: 500; font-size: clamp(7px, 0.85vw, 10px); }
  .a5 { background: var(--c5); color: #a02050; } .a5.area-header { background: var(--h5b); color: var(--h5); }
  .a6 { background: var(--c6); color: #908600; } .a6.area-header { background: var(--h6b); color: var(--h6); }
  .a7 { background: var(--c7); color: #2068a8; } .a7.area-header { background: var(--h7b); color: var(--h7); }
  .a8 { background: var(--c8); color: #508a10; } .a8.area-header { background: var(--h8b); color: var(--h8); }

  @media (max-width: 700px) {
    body { align-items: stretch; padding: 36px 0 90px; }
    .header { margin-bottom: 20px; }
    .mandart-wrapper { width: 100%; }
    .mandart-grid { aspect-ratio: unset; gap: 1px; }
    .cell { font-size: 7px; padding: 1px; line-height: 1.15; word-break: break-all; }
    .cell.area-header { font-size: 8px; word-break: keep-all; }
    .cell.center-goal { font-size: 9px; }
  }

  @keyframes pulse { 0% { filter: brightness(1); } 45% { filter: brightness(2.5); } 100% { filter: brightness(1); } }
  .cell.highlighted { animation: pulse 0.65s ease; }

  .footer { margin-top: 24px; font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--text-dim); opacity: 0.35; letter-spacing: 0.5px; }

  /* ── Tab nav ── */
  .tab-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(8,8,9,0.96);
    border-top: 1px solid var(--border);
    display: grid; grid-template-columns: repeat(5, 1fr);
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
    backdrop-filter: blur(8px);
  }
  .tab-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 9px 4px 8px; gap: 5px; cursor: pointer; border: none;
    background: transparent; color: var(--text-dim);
    font-family: 'IBM Plex Sans KR', sans-serif; font-size: 9px; font-weight: 400;
    transition: color 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .tab-btn:active { opacity: 0.4; }
  .tab-dot { width: 5px; height: 5px; border-radius: 50%; }
  .tab-btn.active { color: #c8c8c8; }

  /* ── 기록 패널 ── */
  .log-panel {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; bottom: 60px;
    background: var(--bg);
    z-index: 90; overflow-y: auto;
    padding: 20px 16px 20px;
  }
  .log-panel.open { display: block; }
  .log-panel-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 16px; letter-spacing: -0.3px; }

  .log-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .log-filter-btn {
    padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); font-size: 10px;
    font-family: 'IBM Plex Sans KR', sans-serif; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .log-filter-btn.active { background: var(--surface); color: var(--text); border-color: #444; }

  .log-list { display: flex; flex-direction: column; gap: 8px; }
  .log-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 12px 14px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .log-item-header { display: flex; justify-content: space-between; align-items: center; }
  .log-item-title { font-size: 11px; font-weight: 500; color: var(--text); }
  .log-item-date { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-dim); }
  .log-item-comment { font-size: 11px; color: #888; margin-top: 2px; }
  .log-item-delete { font-size: 10px; color: #444; cursor: pointer; padding: 2px 6px; border: none; background: transparent; }
  .log-item-delete:hover { color: #888; }
  .log-empty { font-size: 11px; color: var(--text-dim); text-align: center; padding: 40px 0; }

  /* ── 기록 입력 모달 ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #141415; border: 1px solid var(--border);
    border-radius: 12px 12px 0 0;
    padding: 20px 20px 32px; width: 100%; max-width: 600px;
  }
  .modal-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .modal-cell-name { font-size: 11px; color: var(--text-dim); margin-bottom: 16px; }
  .modal label { font-size: 10px; color: var(--text-dim); display: block; margin-bottom: 6px; margin-top: 12px; }
  .modal input[type="date"], .modal textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-family: 'IBM Plex Sans KR', sans-serif;
    font-size: 12px; padding: 10px 12px; outline: none;
  }
  .modal input[type="date"]:focus, .modal textarea:focus { border-color: #444; }
  .modal textarea { resize: none; height: 80px; line-height: 1.5; }
  .modal-btns { display: flex; gap: 8px; margin-top: 16px; }
  .modal-btn {
    flex: 1; padding: 12px; border-radius: 4px; border: none;
    font-family: 'IBM Plex Sans KR', sans-serif; font-size: 12px;
    font-weight: 500; cursor: pointer;
  }
  .modal-btn.confirm { background: #2a2a2a; color: var(--text); }
  .modal-btn.confirm:hover { background: #333; }
  .modal-btn.cancel { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
</style>
</head>
<body>

<div class="header">
  <div class="header-sub">Mandal · Art</div>
  <h1><span>이상향</span></h1>
  <div class="header-line"></div>
</div>

<div class="mandart-wrapper">
  <div class="mandart-grid" id="grid"></div>
</div>

<div class="footer">기본에 충실하고, 매일 조금씩</div>

<!-- 기록 패널 -->
<div class="log-panel" id="logPanel">
  <div class="log-panel-title">기록</div>
  <div class="log-filter" id="logFilter"></div>
  <div class="log-list" id="logList"></div>
</div>

<!-- 기록 입력 모달 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">기록 남기기</div>
    <div class="modal-cell-name" id="modalCellName"></div>
    <label>날짜</label>
    <input type="date" id="modalDate">
    <label>메모 (선택)</label>
    <textarea id="modalComment" placeholder="예) 완독. 생각보다 어렵지 않았다."></textarea>
    <div class="modal-btns">
      <button class="modal-btn cancel" id="modalCancel">취소</button>
      <button class="modal-btn confirm" id="modalConfirm">저장</button>
    </div>
  </div>
</div>

<nav class="tab-nav" id="tabNav"></nav>

<script>
const areas = [
  { id: 'a1', title: '인성\n품격', items: ['하루 1번\n감사 표현', '일상에서\n욕설하지\n않기', '상대 말\n끊지 않기', '약속 시간\n준수', '인사', '실수\n인정하고\n사과하기', '의식적으로\n배려\n행동하기', '하루 끝\n3분 성찰'] },
  { id: 'a2', title: '자기관리\n루틴', items: ['평일 7:30\n주말 9시 기상', '평일 23:30\n주말 1시\n폰 내려두기', '할 일\n뽑기 완료', '일\n미루지 않기', '유튜브\n절제', '이부자리\n정리', '주간 회고\n(일요일)', '만다르트 계획\n잊지 않기'] },
  { id: 'a3', title: '독서\n지식', items: ['매일\n책 읽기', '월 2권\n독서', '분기 1권\n벽돌책 읽기', '독서노트\n작성하기', '매일\nBrilliant 풀기', '영어공부\n앱 학습', '영어 콘텐츠\n하루 1개', '호기심\n깊게\n파고들기'] },
  { id: 'a4', title: '체력\n건강', items: ['매일\n스트레칭', '물 하루\n1리터 이상', '걷기 하루\n8000보 이상', '달리기\n주 10km\n이상', '달리기\n월 50km\n이상', '음주\n월 5회 제한', '다리 찢기\n노력', '푸시업\n노력'] },
  { id: 'a5', title: '커리어\n실력', items: ['부기스\n발전', '상담 자격증\n(임상심리사\n·청소년상담사)', '컴퓨터 자격증\n(컴활\n·정보처리기사)', '기타 자격증\n(지도사·운용사\n·중개사·분석사)', '노션\n활용', 'AI 활용\n프로젝트\n기획', '토익 900\n오픽 AL', '재능기부\n(봉사)'] },
  { id: 'a6', title: '경제력\n재정', items: ['매일\n시황 파악', '포트폴리오\n월마다\n리밸런싱', '소비\n절제', '일희일비\n하지 않기', '분기별 재정\n목표 점검', '복리\n명심', '격월 투자\n책 1권', '매일 투자글\n1편 읽기'] },
  { id: 'a7', title: '철학\n가치관', items: ['매일\n일기 쓰기', '월 1회\n감상문', '주 1회\n자유글', '욕심\n내지 않기', '원하면\n행동하기', '분기 1권\n철학책 읽기', '손웅정·아이유\n생각하기', 'Dune\n읽기'] },
  { id: 'a8', title: '창의성\n예술', items: ['음악\n많이 듣기', '월 1회\n전시', '월 영화\n2편', '분기 1번\n극장', '연 3회\n공연', '한 줄\n코멘트', '악기\n연습', '사진·영상\n기록'] },
];

const grid = Array.from({length: 9}, () => Array(9).fill(null));
function fillBlock(sr, sc, area) {
  const pos = [[0,0],[0,1],[0,2],[1,0],[1,1],[1,2],[2,0],[2,1],[2,2]];
  const sur = [0,1,2,3,5,6,7,8];
  pos.forEach(([dr,dc], idx) => {
    const r = sr+dr, c = sc+dc;
    grid[r][c] = idx===4
      ? { text: area.title, cls: area.id+' area-header' }
      : { text: area.items[sur.indexOf(idx)], cls: area.id };
  });
}
fillBlock(0,0,areas[0]); fillBlock(0,3,areas[1]); fillBlock(0,6,areas[2]);
fillBlock(3,0,areas[3]); fillBlock(3,6,areas[4]);
fillBlock(6,0,areas[5]); fillBlock(6,3,areas[6]); fillBlock(6,6,areas[7]);

const ct = areas.map(a=>a.title);
[[3,3,ct[0]],[3,4,ct[1]],[3,5,ct[2]],[4,3,ct[3]],[4,5,ct[4]],[5,3,ct[5]],[5,4,ct[6]],[5,5,ct[7]]].forEach(([r,c,t])=>{
  grid[r][c] = { text:t, cls:'center-block area-header' };
});
grid[4][4] = { text:'이상향', cls:'center-goal' };

// ── Storage ──
const TODAY = new Date().toISOString().slice(0,10);
let clickData = {};
let logData = []; // [{ key, cellText, areaId, date, comment }]

try { clickData = JSON.parse(localStorage.getItem('mandart_clicks')) || {}; } catch(e) {}
try { logData = JSON.parse(localStorage.getItem('mandart_logs')) || []; } catch(e) {}

function saveClicks() { localStorage.setItem('mandart_clicks', JSON.stringify(clickData)); }
function saveLogs() { localStorage.setItem('mandart_logs', JSON.stringify(logData)); }
function getCellKey(r,c) { return `${r}_${c}`; }

function getCycleDays(text) {
  if (!text) return 1;
  if (text.includes('음주') || text.includes('5회')) return 1;
  if (text.includes('격월')) return 60;
  if (text.includes('분기')) return 90;
  if (text.includes('연 ') || text.includes('연\n') || /^연\d/.test(text)) return 365;
  if (text.includes('월')) return 30;
  if (text.includes('주')) return 7;
  return 1;
}

function isLoggable(text) {
  if (!text) return false;
  if (text.includes('음주') || text.includes('5회')) return false;
  return getCycleDays(text) > 1;
}

function isClickable(key, cycleDays) {
  const last = clickData[key]?.lastDate;
  if (!last) return true;
  const diff = (new Date(TODAY) - new Date(last)) / 86400000;
  return diff >= cycleDays;
}
function isClickedToday(key, cycleDays) {
  const last = clickData[key]?.lastDate;
  if (!last) return false;
  const diff = (new Date(TODAY) - new Date(last)) / 86400000;
  return cycleDays === 1 ? last === TODAY : diff < cycleDays;
}
function applyBrightness(div, key) {
  const count = clickData[key]?.count || 0;
  if (!count) { div.style.filter = ''; return; }
  div.style.filter = `brightness(${1 + Math.min(count/365,1)*2.5})`;
  div.style.transition = 'filter 0.3s ease';
}
function applyBorder(div, key, cycleDays) {
  if (isClickedToday(key, cycleDays)) {
    div.style.outline = '1.5px solid rgba(255,255,255,0.85)';
    div.style.outlineOffset = '-1.5px';
    div.style.position = 'relative'; div.style.zIndex = '2';
  } else {
    div.style.outline = ''; div.style.outlineOffset = '';
  }
}

// ── 모달 ──
let modalCallback = null;
const modalOverlay = document.getElementById('modalOverlay');
const modalDate = document.getElementById('modalDate');
const modalComment = document.getElementById('modalComment');
const modalCellName = document.getElementById('modalCellName');

document.getElementById('modalCancel').addEventListener('click', () => {
  modalOverlay.classList.remove('open');
});
document.getElementById('modalConfirm').addEventListener('click', () => {
  if (modalCallback) modalCallback(modalDate.value, modalComment.value.trim());
  modalOverlay.classList.remove('open');
});
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) modalOverlay.classList.remove('open');
});

function openModal(cellText, areaId, onSave) {
  modalCellName.textContent = cellText.replace(/\n/g, ' ');
  modalDate.value = TODAY;
  modalComment.value = '';
  modalCallback = (date, comment) => onSave(date, comment);
  modalOverlay.classList.add('open');
  setTimeout(() => modalComment.focus(), 300);
}

// ── 기록 패널 렌더 ──
const areaNames = ['인성/품격','자기관리/루틴','독서/지식','체력/건강','커리어/실력','경제력/재정','철학/가치관','창의성/예술'];
const areaIds = areas.map(a => a.id);
let activeFilter = 'all';

function renderLogs() {
  const list = document.getElementById('logList');
  const filtered = activeFilter === 'all'
    ? [...logData]
    : logData.filter(l => l.areaId === activeFilter);
  filtered.sort((a,b) => b.date.localeCompare(a.date));

  if (!filtered.length) {
    list.innerHTML = '<div class="log-empty">아직 기록이 없어요</div>';
    return;
  }
  list.innerHTML = filtered.map((l, i) => {
    const realIdx = logData.indexOf(l);
    const areaName = areaNames[areaIds.indexOf(l.areaId)] || '';
    return `
    <div class="log-item">
      <div class="log-item-header">
        <span class="log-item-title">${l.cellText.replace(/\n/g,' ')} <span style="color:var(--text-dim);font-weight:400;font-size:10px">· ${areaName}</span></span>
        <button class="log-item-delete" onclick="deleteLog(${realIdx})">✕</button>
      </div>
      <div class="log-item-date">${l.date}</div>
      ${l.comment ? `<div class="log-item-comment">${l.comment}</div>` : ''}
    </div>`;
  }).join('');
}

function deleteLog(idx) {
  logData.splice(idx, 1);
  saveLogs();
  renderLogs();
}

function buildFilter() {
  const filter = document.getElementById('logFilter');
  filter.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'log-filter-btn' + (activeFilter==='all'?' active':'');
  all.textContent = '전체';
  all.onclick = () => { activeFilter='all'; buildFilter(); renderLogs(); };
  filter.appendChild(all);
  areas.forEach((area, i) => {
    const btn = document.createElement('button');
    btn.className = 'log-filter-btn' + (activeFilter===area.id?' active':'');
    btn.textContent = areaNames[i];
    btn.onclick = () => { activeFilter=area.id; buildFilter(); renderLogs(); };
    filter.appendChild(btn);
  });
}

// ── 그리드 렌더 ──
const gridEl = document.getElementById('grid');
const cellEls = [];

for (let r = 0; r < 9; r++) {
  cellEls[r] = [];
  for (let c = 0; c < 9; c++) {
    const cell = grid[r][c];
    const div = document.createElement('div');
    div.className = 'cell ' + (cell ? cell.cls : '');
    div.textContent = cell ? cell.text.replace(/\\n/g, '\n') : '';
    div.style.whiteSpace = 'pre-line';

    const interactive = cell && !cell.cls.includes('center-goal') && !cell.cls.includes('area-header') && !cell.cls.includes('center-block');

    if (interactive) {
      const key = getCellKey(r,c);
      const cycleDays = getCycleDays(cell.text);
      const loggable = isLoggable(cell.text);
      const areaId = cell.cls.split(' ')[0];
      div.style.cursor = 'pointer';
      applyBrightness(div, key);
      applyBorder(div, key, cycleDays);

      // 더블탭/더블클릭 취소
      const undoClick = () => {
        const d = clickData[key];
        if (!d || d.count === 0) return;
        clickData[key].count--;
        if (!clickData[key].count) delete clickData[key];
        else clickData[key].lastDate = null;
        saveClicks();
        applyBrightness(div, key);
        applyBorder(div, key, cycleDays);
      };

      // 더블클릭 (데스크탑)
      div.addEventListener('dblclick', (e) => { e.preventDefault(); undoClick(); });

      // 더블탭 (모바일)
      let lastTap = 0;
      div.addEventListener('click', (e) => {
        const now = Date.now();
        if (now - lastTap < 300) {
          // 더블탭 → 취소
          undoClick();
          lastTap = 0;
          return;
        }
        lastTap = now;
        // 싱글 클릭 → 체크
        if (!isClickable(key, cycleDays)) return;
        clickData[key] = { count: (clickData[key]?.count||0)+1, lastDate: TODAY };
        saveClicks();
        applyBrightness(div, key);
        applyBorder(div, key, cycleDays);
        div.style.transform = 'scale(0.93)';
        setTimeout(()=>{ div.style.transform=''; }, 150);
      });

      // 길게 누르기 → 기록 가능한 셀만 모달
      let pressTimer;
      div.addEventListener('touchstart', () => {
        pressTimer = setTimeout(() => {
          if (loggable) {
            openModal(cell.text, areaId, (date, comment) => {
              logData.push({ key, cellText: cell.text, areaId, date, comment });
              saveLogs();
              if (activeFilter !== 'all' && activeFilter !== areaId) activeFilter = 'all';
              renderLogs();
            });
          }
        }, 600);
      }, { passive: true });
      div.addEventListener('touchend', () => clearTimeout(pressTimer));
      div.addEventListener('touchmove', () => clearTimeout(pressTimer));
      // 우클릭 → 기록 모달 (데스크탑)
      div.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        if (loggable) {
          openModal(cell.text, areaId, (date, comment) => {
            logData.push({ key, cellText: cell.text, areaId, date, comment });
            saveLogs();
            renderLogs();
          });
        }
      });
    }

    gridEl.appendChild(div);
    cellEls[r][c] = div;
  }
}

// ── 탭 네비게이션 ──
const blockPositions = [[0,0],[0,3],[0,6],[3,0],[3,6],[6,0],[6,3],[6,6]];
const areaColors = ['--h1','--h2','--h3','--h4','--h5','--h6','--h7','--h8'];
const areaLabels = ['인성\n품격','자기관리\n루틴','독서\n지식','체력\n건강','커리어\n실력','경제력\n재정','철학\n가치관','창의성\n예술'];

const tabNav = document.getElementById('tabNav');
const logPanel = document.getElementById('logPanel');
let logPanelOpen = false;

// 영역 탭 8개 (4+4 두 줄 느낌이지만 5열로 나눠 2행 스크롤 대신 탭 8개 + 기록 탭 1개)
// 탭: 4개씩 + 기록 탭 = 총 5개 보이도록 (8개 영역은 탭 누르면 grid로 이동)
// 단순하게: 4개 영역탭 row1 + 4개 row2 보다 스크롤 가능한 탭바로
// → 현재 grid-template-columns: repeat(5,1fr) → 4개 + 기록 탭

// 탭을 두 줄로 만들기 위해 별도 처리
const tabRow1 = document.createElement('div');
const tabRow2 = document.createElement('div');
tabRow1.style.cssText = 'display:grid;grid-template-columns:repeat(5,1fr);grid-column:1/-1;';
tabRow2.style.cssText = 'display:grid;grid-template-columns:repeat(5,1fr);grid-column:1/-1;';

// row1: 인성, 자기관리, 독서, 체력, 커리어
// row2: 경제력, 철학, 창의성, (빈칸), 기록
tabNav.style.gridTemplateColumns = '1fr';
tabNav.style.gridTemplateRows = 'auto auto';

areas.forEach((area, i) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn';
  btn.innerHTML = `<div class="tab-dot" style="background:var(${areaColors[i]})"></div><span style="white-space:pre-line;text-align:center;font-size:8px">${areaLabels[i]}</span>`;
  btn.addEventListener('click', () => {
    if (logPanelOpen) { logPanel.classList.remove('open'); logPanelOpen = false; }
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const [sr,sc] = blockPositions[i];
    cellEls[sr+1][sc+1].scrollIntoView({ behavior:'smooth', block:'center' });
    for (let dr=0;dr<3;dr++) for (let dc=0;dc<3;dc++) {
      const cell = cellEls[sr+dr][sc+dc];
      cell.classList.remove('highlighted'); void cell.offsetWidth;
      cell.classList.add('highlighted');
      setTimeout(()=>cell.classList.remove('highlighted'), 750);
    }
  });
  i < 5 ? tabRow1.appendChild(btn) : tabRow2.appendChild(btn);
});

// 빈칸
const empty = document.createElement('div');
tabRow2.appendChild(empty);

// 기록 탭
const logBtn = document.createElement('button');
logBtn.className = 'tab-btn';
logBtn.innerHTML = `<div style="width:5px;height:5px;border-radius:50%;background:#555"></div><span style="font-size:8px">기록</span>`;
logBtn.addEventListener('click', () => {
  logPanelOpen = !logPanelOpen;
  logPanel.classList.toggle('open', logPanelOpen);
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if (logPanelOpen) {
    logBtn.classList.add('active');
    buildFilter();
    renderLogs();
  }
});
tabRow2.appendChild(logBtn);

tabNav.appendChild(tabRow1);
tabNav.appendChild(tabRow2);

// 탭 두 줄이니 패딩 조정
document.body.style.paddingBottom = '110px';
logPanel.style.bottom = '110px';

// ── 모바일 그리드 ──
function fixMobileGrid() {
  if (window.innerWidth <= 700) {
    const w = document.documentElement.clientWidth;
    const cellSize = Math.floor((w - 8) / 9);
    gridEl.style.gridTemplateColumns = `repeat(9, ${cellSize}px)`;
    gridEl.style.gridTemplateRows = `repeat(9, ${cellSize}px)`;
    gridEl.style.width = w + 'px';
    gridEl.style.gap = '1px';
  }
}
function autoFitCells() {
  if (window.innerWidth > 700) return;
  gridEl.querySelectorAll('.cell').forEach(cell => {
    const len = cell.textContent.trim().replace(/\s/g,'').length;
    cell.style.fontSize = len<=4?'8.5px':len<=7?'7.5px':len<=10?'6.5px':'5.5px';
  });
}
fixMobileGrid(); autoFitCells();
window.addEventListener('resize', ()=>{ fixMobileGrid(); autoFitCells(); });
</script>
